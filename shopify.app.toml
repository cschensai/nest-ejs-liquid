# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e4a32d91b1b276257d01bac015bfda44"
name = "test-cs-app"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_app_proxy,read_products,write_products,read_orders,write_orders,read_customers,write_customers,read_inventory,write_inventory,read_fulfillments,write_fulfillments,read_content,write_content,read_themes,write_themes,read_price_rules,write_price_rules,read_shipping,write_shipping,read_checkouts,write_checkouts,read_analytics,read_locations,read_product_listings,unauthenticated_read_product_listings,unauthenticated_read_product_inventory"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]

# 代理 - 将店铺请求代理到应用后端
[app_proxy]
url = "https://job-compare-shipment-florence.trycloudflare.com"
subpath = "proxy"
prefix = "apps"
